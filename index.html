<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
		<meta name="theme-color" content="#0b0f17">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<title>SCRT — Challenge Run Tracker</title>
		<link rel="icon" href="favicon.ico" sizes="any">
		<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
		<link rel="stylesheet" href="https://woahitsjeebus.github.io/JUIL/site.css">
		<style>
			.gamesRoot {
				display: grid;
				gap: 14px;
				grid-template-columns: min(920px, 100%);
				justify-content: center;
				margin-top: 14px;
			}

			.gameHeadLeft {
				display: flex;
				align-items: center;
				gap: 12px;
				min-width: 0;
			}

			.gameThumb {
				width: 64px;
				height: 64px;
				border-radius: 12px;
				border: 1px solid rgba(255, 255, 255, .10);
				object-fit: cover;
				background: rgba(0, 0, 0, .25);
				flex: 0 0 auto;
				transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
			}

			.gameThumb:hover {
				transform: translateY(-3px) scale(5);
			}

			.gameTitleWrap {
				min-width: 0;
				display: flex;
				flex-direction: column;
				gap: 4px;
			}

			.gameTitleLink {
				color: inherit;
				text-decoration: none;
				font-weight: 800;
				letter-spacing: .2px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.gameTitleLink:hover {
				text-decoration: underline;
			}

			.gameMetaLine {
				color: var(--muted);
				font-size: 12px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.runTitle {
				font-weight: 700;
				letter-spacing: .1px;
			}

			.badgeRow {
				display: inline-flex;
				gap: 8px;
				flex-wrap: wrap;
				align-items: center;
			}

			.runRules {
				margin-top: 6px;
				color: var(--muted);
				font-size: 12px;
				line-height: 1.35;
				white-space: pre-wrap;
			}

			.emptyCardBody {
				padding: 14px;
				color: var(--muted);
				font-size: 13px;
				line-height: 1.45;
			}

			@media(max-width:620px) {

				thead th:nth-child(2),
				tbody td:nth-child(2) {
					display: none;
				}
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<header>
				<div>
					<h1>Stilltone's Challenge Run Tracker</h1>
					<div class="sub">grouped by game</div>
				</div>
			</header>
			<div class="fadeWrap fadeScroll" id="toolbarFade" style="margin-bottom:12px;">
				<div class="toolbar hScroll" id="toolbarScroll">
					<div class="pill" id="storagePill">Storage: Local</div>
					<div class="pill" id="tzPill">Local TZ: —</div>
					<div class="pill" id="gamesPill">Games: —</div>
					<div class="pill" id="runsPill">Runs: —</div>
					<div class="pill" id="statusPill">Status: —</div>
				</div>
			</div>
			<div class="gamesRoot" id="gamesRoot">
				<div class="card">
					<div class="head">
						<div class="title">Loading…</div>
						<div class="tag">runs.json</div>
					</div>
					<div class="emptyCardBody"> Fetching game folders and run lists. </div>
				</div>
			</div>
			<div class="footer" style="display:flex;justify-content:center;margin-top:14px;"><code class="inline" id="versionCode">v—</code></div>
		</div>
		<div class="tabsBar" style="width:100%;">
			<nav class="tabs"><a class="tabBtn active" data-tab="home" href="./"><span class="tabDot"></span>Home</a><a class="tabBtn" data-tab="settings" href="./pages/settings/"><span class="tabDot"></span>Settings</a><a class="tabBtn" data-tab="about" href="./pages/about/"><span class="tabDot"></span>About</a></nav>
		</div>
		<script type="module">
			import {
				attachFadeToScroller,
				autoMarkActiveTab,
				initAppSettings,
				startOrbBackgroundFromSettings,
			// } from "./assets/site.js"
			 } from "https://woahitsjeebus.github.io/JUIL/site.js"
			
			// Get version from assets/versions.json
			let _VERSION = "—"
			fetch("./assets/versions.json")
				.then(res => res.json())
				.then(data => {
					_VERSION = data.current || "—"
					document.getElementById("versionCode").textContent = `v${_VERSION}`
				})

			const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local"
			document.getElementById("tzPill").textContent = `Local TZ: ${tz}`
			document.getElementById("versionCode").textContent = `v${_VERSION}`
			initAppSettings()
			startOrbBackgroundFromSettings({
				spawnEveryMs: 1600,
				sizeMin: 340,
				sizeMax: 720
			})
			autoMarkActiveTab("home")
			attachFadeToScroller(document.getElementById("toolbarScroll"), document.getElementById("toolbarFade"))
			const gamesRoot = document.getElementById("gamesRoot")
			const gamesPill = document.getElementById("gamesPill")
			const runsPill = document.getElementById("runsPill")
			const statusPill = document.getElementById("statusPill")
			const GH_OWNER = "woahitsjeebus"
			const GH_REPO = "SCRT"
			const RUNS_CACHE_TTL = 10 * 60 * 1000
			const DIR_CACHE_TTL = 30 * 60 * 1000
			let _completedRuns = 0

			function getCached(key, ttl) {
				try {
					const raw = localStorage.getItem(key)
					if (!raw) return null
					const obj = JSON.parse(raw)
					if (Date.now() - obj.time > ttl) return null
					return obj.value
				} catch {
					return null
				}
			}

			function setCached(key, val) {
				try {
					localStorage.setItem(key, JSON.stringify({
						time: Date.now(),
						value: val
					}))
				} catch {}
			}

			function getRawRunsUrl(folder) {
				return `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/games/${encodeURIComponent(folder)}/runs.json`
			}

			function detectGitHubRepo() {
				const host = location.hostname.toLowerCase()
				if (!host.endsWith(".github.io")) return null
				return {
					owner: GH_OWNER,
					repo: GH_REPO
				}
			}
			async function ghListGameFolders() {
				const cache = getCached("scrt_dir_cache", DIR_CACHE_TTL)
				if (cache) return cache
				const info = detectGitHubRepo()
				if (!info) return null
				const api = `https://api.github.com/repos/${info.owner}/${info.repo}/contents/games`
				const res = await fetch(api)
				if (!res.ok) return null
				const j = await res.json()
				const dirs = j.filter(x => x.type === "dir").map(x => x.name)
				setCached("scrt_dir_cache", dirs)
				return dirs
			}
			async function listGameFolders() {
				try {
					const dirs = await ghListGameFolders()
					if (dirs && dirs.length) return {
						source: "github",
						dirs
					}
				} catch {}
				try {
					const res = await fetch("./games/index.json")
					if (res.ok) {
						const arr = await res.json()
						if (Array.isArray(arr)) return {
							source: "manifest",
							dirs: arr
						}
					}
				} catch {}
				return {
					source: "none",
					dirs: []
				}
			}

			function extractSpeedrunAbbrev(url) {
				try {
					const u = new URL(url)
					const parts = u.pathname.split("/").filter(Boolean)
					return parts[0] || null
				} catch {
					return null
				}
			}

			function isSpeedrunDotComUrl(url) {
				try {
					const u = new URL(url)
					return u.hostname.includes("speedrun.com")
				} catch {
					return false
				}
			}
			async function fetchSpeedrunCover(src) {
				if (!src) return null
				if (!isSpeedrunDotComUrl(src)) return src
				const ab = extractSpeedrunAbbrev(src)
				if (!ab) return null
				try {
					const api = `https://www.speedrun.com/api/v1/games?abbreviation=${ab}`
					const res = await fetch(api)
					const j = await res.json()
					const assets = j?.data?.[0]?.assets
					return assets?.["cover-large"]?.uri || assets?.["cover-medium"]?.uri || assets?.["cover-small"]?.uri || null
				} catch {
					return null
				}
			}

			function parseRunsFile(arr) {
				if (!Array.isArray(arr) || !arr.length) return null
				const meta = arr[0]
				return {
					game: String(meta.game ?? "Unknown"),
					image: meta.image ?? "",
					runs: arr.slice(1)
				}
			}

			function makeTag(text) {
				const s = document.createElement("span")
				s.className = "tag"
				s.textContent = text
				return s
			}

			function renderGameSection(model, coverUrl) {
				const card = document.createElement("div")
				card.className = "card"
				const head = document.createElement("div")
				head.className = "head"
				const left = document.createElement("div")
				left.className = "gameHeadLeft"
				const img = document.createElement("img")
				img.className = "gameThumb"
				img.loading = "lazy"
				if (coverUrl) img.src = coverUrl
				const tw = document.createElement("div")
				tw.className = "gameTitleWrap"
				const a = document.createElement("a")
				a.className = "gameTitleLink"
				a.textContent = model.game
				if (model.image && isSpeedrunDotComUrl(model.image)) {
					a.href = model.image
					a.target = "_blank"
				}
				const meta = document.createElement("div")
				meta.className = "gameMetaLine"
				meta.textContent = model.image || ""
				tw.appendChild(a)
				tw.appendChild(meta)
				left.appendChild(img)
				left.appendChild(tw)
				const right = document.createElement("div")
				right.className = "badgeRow"
				const total = model.runs.length
				const completed = model.runs.filter(r => r.completed).length
				const wf = model.runs.filter(r => r.world_first).length
				_completedRuns += completed
				runsPill.textContent = `Runs: ${_completedRuns}`
				right.appendChild(makeTag(`${completed}/${total} completed`))
				if (wf) right.appendChild(makeTag(`${wf} world first`))
				head.appendChild(left)
				head.appendChild(right)
				const table = document.createElement("table")
				const thead = document.createElement("thead")
				thead.innerHTML = `<tr><th>Run</th><th>Rules</th><th>Status</th></tr>`
				table.appendChild(thead)
				const tbody = document.createElement("tbody")
				for (const r of model.runs) {
					const tr = document.createElement("tr")
					const tdTitle = document.createElement("td")
					const title = document.createElement("div")
					title.className = "runTitle"
					title.textContent = r.title || "Untitled"
					const flags = document.createElement("div")
					flags.className = "badgeRow"
					flags.style.marginTop = "8px"
					flags.appendChild(makeTag(r.completed ? "Completed" : "Incomplete"))
					if (r.world_first) flags.appendChild(makeTag("World First"))
					tdTitle.appendChild(title)
					tdTitle.appendChild(flags)
					const tdRules = document.createElement("td")
					tdRules.textContent = r.rules || "—"
					const tdStatus = document.createElement("td")
					tdStatus.appendChild(makeTag(r.completed ? "Done" : "WIP"))
					tr.appendChild(tdTitle)
					tr.appendChild(tdRules)
					tr.appendChild(tdStatus)
					tbody.appendChild(tr)
				}
				table.appendChild(tbody)
				card.appendChild(head)
				card.appendChild(table)
				return card
			}
			async function loadAllGames() {
				statusPill.textContent = "Status: Loading"
				const {
					dirs
				} = await listGameFolders()
				gamesPill.textContent = `Games: ${dirs.length}`
				gamesRoot.innerHTML = ""
				for (const folder of dirs) {
					const cacheKey = `scrt_runs_${folder}`
					let arr = getCached(cacheKey, RUNS_CACHE_TTL)
					if (!arr) {
						const url = getRawRunsUrl(folder)
						const res = await fetch(url)
						if (!res.ok) continue
						arr = await res.json()
						setCached(cacheKey, arr)
					}
					const model = parseRunsFile(arr)
					const card = renderGameSection(model, null)
					gamesRoot.appendChild(card)
					if (model.image) {
						const img = card.querySelector(".gameThumb")
						fetchSpeedrunCover(model.image).then(c => {
							if (c) img.src = c
						})
					}
				}
				statusPill.textContent = "Status: OK"
			}
			loadAllGames()
		</script>
	</body>
</html>
