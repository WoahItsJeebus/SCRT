<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
		<meta name="theme-color" content="#0b0f17">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

		<title>SCRT — Challenge Run Tracker</title>
		<link rel="icon" href="favicon.ico" sizes="any">
		<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
		<link rel="stylesheet" href="./assets/site.css">

		<style>
			/* Page-specific polish (safe to move into site.css later) */
			.gamesRoot{
				display: grid;
				gap: 14px;
				grid-template-columns: min(920px, 100%);
				justify-content: center;
				margin-top: 14px;
			}

			.gameHeadLeft{
				display: flex;
				align-items: center;
				gap: 12px;
				min-width: 0;
			}

			.gameThumb{
				width: 42px;
				height: 42px;
				border-radius: 12px;
				border: 1px solid rgba(255,255,255,.10);
				object-fit: cover;
				background: rgba(0,0,0,.25);
				flex: 0 0 auto;
			}

			.gameTitleWrap{
				min-width: 0;
				display: flex;
				flex-direction: column;
				gap: 4px;
			}

			.gameTitleLink{
				color: inherit;
				text-decoration: none;
				font-weight: 800;
				letter-spacing: .2px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.gameTitleLink:hover{ text-decoration: underline; }

			.gameMetaLine{
				color: var(--muted);
				font-size: 12px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.runTitle{
				font-weight: 700;
				letter-spacing: .1px;
			}

			.badgeRow{
				display: inline-flex;
				gap: 8px;
				flex-wrap: wrap;
				align-items: center;
			}

			/* Make the rules feel secondary */
			.runRules{
				margin-top: 6px;
				color: var(--muted);
				font-size: 12px;
				line-height: 1.35;
				white-space: pre-wrap;
			}

			/* “empty state” */
			.emptyCardBody{
				padding: 14px;
				color: var(--muted);
				font-size: 13px;
				line-height: 1.45;
			}

			/* Make the table a bit friendlier on narrow screens */
			@media (max-width: 620px){
				thead th:nth-child(2),
				tbody td:nth-child(2){
					display:none;
				}
			}
		</style>
	</head>

	<body>
		<div class="wrap">
			<header>
				<div>
					<h1>Stilltone's Challenge Run Tracker</h1>
					<div class="sub">
						grouped by game
					</div>
				</div>
			</header>

			<div class="fadeWrap fadeScroll" id="toolbarFade" style="margin-bottom: 12px;">
				<div class="toolbar hScroll" id="toolbarScroll">
					<div class="pill" id="storagePill">Storage: Local</div>
					<div class="pill" id="tzPill">Local TZ: —</div>
					<div class="pill" id="gamesPill">Games: —</div>
					<div class="pill" id="runsPill">Runs: —</div>
					<div class="pill" id="statusPill">Status: —</div>
				</div>
			</div>

			<div class="gamesRoot" id="gamesRoot">
				<div class="card">
					<div class="head">
						<div class="title">Loading…</div>
						<div class="tag">runs.json</div>
					</div>
					<div class="emptyCardBody">
						Fetching game folders and run lists.
					</div>
				</div>
			</div>

			<div class="footer" style="display: flex; justify-content: center; margin-top: 14px;">
				<code class="inline" id="versionCode">v—</code>
			</div>
		</div>

		<div class="tabsBar" style="width: 100%;">
			<nav class="tabs">
				<a class="tabBtn active" data-tab="home" href="./"><span class="tabDot"></span>Home</a>
				<a class="tabBtn" data-tab="settings" href="./pages/settings/"><span class="tabDot"></span>Settings</a>
				<a class="tabBtn" data-tab="about" href="./pages/about/"><span class="tabDot"></span>About</a>
			</nav>
		</div>

		<script type="module">
			import {
				attachFadeToScroller,
				autoMarkActiveTab,
				initAppSettings,
				startOrbBackgroundFromSettings,
				_VERSION
			} from "./assets/site.js"

			// ------------------------------------------------------------
			// Boot polish
			// ------------------------------------------------------------
			const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local"
			document.getElementById("tzPill").textContent = `Local TZ: ${tz}`
			document.getElementById("versionCode").textContent = `v${_VERSION}`

			initAppSettings()
			startOrbBackgroundFromSettings({ spawnEveryMs: 1600, sizeMin: 340, sizeMax: 720 })
			autoMarkActiveTab("home")

			attachFadeToScroller(
				document.getElementById("toolbarScroll"),
				document.getElementById("toolbarFade")
			)

			const gamesRoot = document.getElementById("gamesRoot")
			const gamesPill = document.getElementById("gamesPill")
			const runsPill = document.getElementById("runsPill")
			const statusPill = document.getElementById("statusPill")

			function escapeHtml(s){
				return String(s ?? "")
					.replaceAll("&", "&amp;")
					.replaceAll("<", "&lt;")
					.replaceAll(">", "&gt;")
					.replaceAll("\"", "&quot;")
					.replaceAll("'", "&#39;")
			}

			function normUrl(s){
				try { return new URL(String(s), location.href).toString() }
				catch { return String(s ?? "") }
			}

			// ------------------------------------------------------------
			// Strategy for "load all runs.json files found in ./games"
			//
			// Static hosting cannot truly “list directories” from the browser.
			// In order:
			//   1) GitHub Pages: use GitHub Contents API to list /games
			//   2) Directory listing servers: fetch "./games/" HTML and scrape links
			//   3) Fallback manifest: "./games/index.json"
			// ------------------------------------------------------------

			// Hard-pin for github pages site:
			const GH_OWNER = "woahitsjeebus"
			const GH_REPO  = "SCRT"

			let _completedRuns = 0

			function detectGitHubRepo(){
				// Force GitHub mode only when actually on github.io (prevents accidental calls locally)
				const host = location.hostname.toLowerCase()
				if (!host.endsWith(".github.io")) return null
				return { owner: GH_OWNER, repo: GH_REPO }
			}

			async function ghListGameFolders(){
				const info = detectGitHubRepo()
				if (!info) return null

				const api = `https://api.github.com/repos/${info.owner}/${info.repo}/contents/games`
				const res = await fetch(api, { headers: { "Accept": "application/vnd.github+json" } })
				if (!res.ok) return null

				const items = await res.json()
				return items.filter(x => x?.type === "dir").map(x => x.name)
			}

			async function ghGetRunsJsonUrl(folder){
				const info = detectGitHubRepo()
				if (!info) return null

				const api = `https://api.github.com/repos/${info.owner}/${info.repo}/contents/games/${encodeURIComponent(folder)}`
				const res = await fetch(api, { headers: { "Accept": "application/vnd.github+json" } })
				if (!res.ok) return null

				const items = await res.json()
				const file = items.find(x => x?.type === "file" && String(x.name).toLowerCase() === "runs.json")
				return file?.download_url ?? null
			}

			async function scrapeDirectoryListingForFolders(){
				const res = await fetch("./games/", { cache: "no-store" })
				if (!res.ok) return null

				const html = await res.text()
				// Find href="SomeFolder/" occurrences
				const re = /href="([^"]+\/)"/g
				const found = new Set()
				for (const m of html.matchAll(re)){
					const href = m[1]
					if (!href) continue
					// strip ./ and /games/ prefixes
					const cleaned = href
						.replaceAll("\\", "/")
						replace(/^\.\/+/,"")
						replace(/^games\/+/,"")
						replace(/^\/games\/+/,"")
					// ignore parent/self
					if (cleaned === "../" || cleaned === "./") continue
					// only 1-segment folders like "Dishonored/"
					const parts = cleaned.split("/").filter(Boolean)
					if (parts.length === 1) found.add(parts[0])
				}
				return [...found]
			}

			async function manifestListGameFolders(){
				// Optional: create ./games/index.json like: ["Dishonored", "Elden Ring"]
				const res = await fetch("./games/index.json", { cache: "no-store" })
				if (!res.ok) return null
				const arr = await res.json()
				if (!Array.isArray(arr)) return null
				return arr.map(x => String(x)).filter(Boolean)
			}

			async function listGameFolders(){
				// 1) GitHub Pages auto
				try {
					const dirs = await ghListGameFolders()
					if (dirs && dirs.length) return { source: "github", dirs }
				} catch {}

				// 2) directory listing scrape (dev servers)
				try {
					const dirs = await scrapeDirectoryListingForFolders()
					if (dirs && dirs.length) return { source: "listing", dirs }
				} catch {}

				// 3) fallback manifest
				try {
					const dirs = await manifestListGameFolders()
					if (dirs && dirs.length) return { source: "manifest", dirs }
				} catch {}

				return { source: "none", dirs: [] }
			}

			// Speedrun.com cover fetch
			function extractSpeedrunAbbrev(speedrunUrl){
				// expected: https://www.speedrun.com/<abbrev> or https://www.speedrun.com/<abbrev>/...
				try{
					const u = new URL(speedrunUrl)
					const parts = u.pathname.split("/").filter(Boolean)
					return parts[0] || null
				}catch{
					return null
				}
			}

			function looksLikeImageUrl(url){
				try{
					const u = new URL(String(url), location.href)
					const p = u.pathname.toLowerCase()
					return (
						p.endsWith(".png") ||
						p.endsWith(".jpg") ||
						p.endsWith(".jpeg") ||
						p.endsWith(".webp") ||
						p.endsWith(".gif") ||
						p.endsWith(".avif") ||
						p.endsWith(".svg")
					)
				}catch{
					return false
				}
			}

			function isSpeedrunDotComUrl(url){
				try{
					const u = new URL(String(url), location.href)
					// speedrun.com and www.speedrun.com
					return u.hostname === "speedrun.com" || u.hostname === "www.speedrun.com"
				}catch{
					return false
				}
			}

			function isVideoLink(url){
				try{
					const u = new URL(String(url), location.href)
					const host = u.hostname.toLowerCase()
					return (
						host.includes("youtube.com") ||
						host.includes("youtu.be") ||
						host.includes("twitch.tv") ||
						host.includes("vimeo.com") ||
						host.includes("dailymotion.com")
					)
				}catch{
					return false
				}
			}

			async function fetchSpeedrunCover(coverSource){
				// coverSource can be:
				// - speedrun.com game page
				// - direct image url
				// - empty/null

				if (!coverSource) return null
				const src = String(coverSource).trim()
				if (!src) return null

				// If it is NOT speedrun.com, assume it is already an image
				if (!isSpeedrunDotComUrl(src)){
					return src
				}

				// Otherwise resolve via speedrun API
				const ab = extractSpeedrunAbbrev(src)
				if (!ab) return null

				try{
					const api = `https://www.speedrun.com/api/v1/games?abbreviation=${encodeURIComponent(ab)}`
					const res = await fetch(api, { headers: { "Accept": "application/json" } })
					if (!res.ok) return null

					const j = await res.json()
					const game = j?.data?.[0]
					const assets = game?.assets

					return assets?.["cover-large"]?.uri
						|| assets?.["cover-tall"]?.uri
						|| assets?.["cover-medium"]?.uri
						|| assets?.["cover-small"]?.uri
						|| null
				}catch{
					return null
				}
			}

			// ------------------------------------------------------------
			// Rendering
			// runs.json format:
			// [
			//   { "game": "...", "image": "..." },
			//   { "title": "...", "rules": "", "completed": true, "world_first": false },
			//   ...
			// ]
			// ------------------------------------------------------------
			function parseRunsFile(arr){
				if (!Array.isArray(arr) || !arr.length) return null
				const meta = arr[0] && typeof arr[0] === "object" ? arr[0] : {}
				const runs = arr.slice(1).filter(x => x && typeof x === "object")
				return {
					game: String(meta.game ?? "Unknown Game"),
					image: meta.image ? String(meta.image) : "",
					runs
				}
			}

			function makeTag(text){
				const span = document.createElement("span")
				span.className = "tag"
				span.textContent = text
				return span
			}
			
			function getCompletedRunsCount(runs){
				return runs.filter(r => r.completed === true).length
			}

			function renderGameSection(model, coverUrl){
				const card = document.createElement("div")
				card.className = "card"

				const head = document.createElement("div")
				head.className = "head"

				const left = document.createElement("div")
				left.className = "gameHeadLeft"

				const img = document.createElement("img")
				img.className = "gameThumb"
				img.alt = ""
				img.loading = "lazy"
				if (coverUrl) img.src = coverUrl

				const tw = document.createElement("div")
				tw.className = "gameTitleWrap"

				const a = document.createElement("a")
				a.className = "gameTitleLink"
				a.textContent = model.game
				if (model.image && isSpeedrunDotComUrl(model.image)){
					a.href = model.image
					a.target = "_blank"
					a.rel = "noreferrer noopener"
					a.title = model.image
				}else{
					a.href = "javascript:void(0)"
				}

				const metaLine = document.createElement("div")
				metaLine.className = "gameMetaLine"
				metaLine.textContent = model.image && isSpeedrunDotComUrl(model.image) ? model.image : ""

				tw.appendChild(a)
				tw.appendChild(metaLine)

				left.appendChild(img)
				left.appendChild(tw)

				// right side tags
				const right = document.createElement("div")
				right.className = "badgeRow"

				const total = model.runs.length
				const completed = model.runs.filter(r => r.completed === true).length
				const wf = model.runs.filter(r => r.world_first === true).length
				_completedRuns += completed
				runsPill.textContent = `Runs: ${_completedRuns}`

				right.appendChild(makeTag(`${completed}/${total} completed`))
				if (wf > 0) right.appendChild(makeTag(`${wf} world first`))

				head.appendChild(left)
				head.appendChild(right)

				const table = document.createElement("table")
				const thead = document.createElement("thead")
				thead.innerHTML = `
					<tr>
						<th>Run</th>
						<th>Rules</th>
						<th>Status</th>
					</tr>
				`
				table.appendChild(thead)

				const tbody = document.createElement("tbody")

				for (const r of model.runs){
					const tr = document.createElement("tr")

					// Run title + flags (world first)
					const tdTitle = document.createElement("td")
					const title = document.createElement("div")
					title.className = "runTitle"
					title.textContent = String(r.title ?? "Untitled")
					// If there’s a video link, make the title a clickable link to it (opens in new tab)
					if (isVideoLink(r.video)){
						title.style.textDecoration = "underline"
						title.style.cursor = "pointer"
						title.title = r.video
						title.onclick = () => window.open(r.video, "_blank", "noopener")
					}

					const flags = document.createElement("div")
					flags.className = "badgeRow"
					flags.style.marginTop = "8px"

					if (r.world_first === true) flags.appendChild(makeTag("World First"))
					if (r.completed === true) flags.appendChild(makeTag("Completed"))
					else flags.appendChild(makeTag("Incomplete"))

					tdTitle.appendChild(title)
					if (flags.childNodes.length) tdTitle.appendChild(flags)

					// Rules
					const tdRules = document.createElement("td")
					const rules = String(r.rules ?? "")
					if (rules.trim()){
						const div = document.createElement("div")
						div.className = "runRules"
						div.textContent = rules
						tdRules.appendChild(div)
					}else{
						tdRules.style.color = "var(--muted)"
						tdRules.textContent = "—"
					}

					// Status column (redundant on desktop, but nice scanning)
					const tdStatus = document.createElement("td")
					const statusRow = document.createElement("div")
					statusRow.className = "badgeRow"
					statusRow.appendChild(makeTag(r.completed === true ? "Done" : "WIP"))
					if (r.world_first === true) statusRow.appendChild(makeTag("WF"))
					tdStatus.appendChild(statusRow)

					tr.appendChild(tdTitle)
					tr.appendChild(tdRules)
					tr.appendChild(tdStatus)

					tbody.appendChild(tr)
				}

				table.appendChild(tbody)

				card.appendChild(head)
				card.appendChild(table)
				return card
			}

			function renderEmptyState(message, detail){
				gamesRoot.innerHTML = ""
				const card = document.createElement("div")
				card.className = "card"
				card.innerHTML = `
					<div class="head">
						<div class="title">${escapeHtml(message)}</div>
						<div class="tag">SCRT</div>
					</div>
					<div class="emptyCardBody">
						${escapeHtml(detail || "")}
					</div>
				`
				gamesRoot.appendChild(card)
			}

			// Main load
			async function loadAllGames(){
				statusPill.textContent = "Status: Loading"
				gamesPill.textContent = "Games: —"

				const { source, dirs } = await listGameFolders()

				gamesPill.textContent = `Games: ${dirs.length}`
				statusPill.textContent = `Status: ${dirs.length ? "OK" : "None"}`

				if (!dirs.length){
					renderEmptyState(
						"No games found.",
						`I couldn’t enumerate ./games/ automatically (source: ${source}). If you're not on GitHub Pages with a public repo, add a fallback manifest at ./games/index.json.`
					)
					return
				}

				gamesRoot.innerHTML = ""

				dirs.sort((a,b)=>a.localeCompare(b, undefined, { sensitivity:"base" }))

				// Fetch all runs.json files in parallel
				const runFetches = dirs.map(async folder => {
					try{
						let runsUrl = null

						if (source === "github"){
							runsUrl = await ghGetRunsJsonUrl(folder)
						}

						if (!runsUrl){
							runsUrl = normUrl(`./games/${encodeURIComponent(folder)}/runs.json`)
						}

						const res = await fetch(runsUrl, { cache: "no-store" })
						if (!res.ok) throw new Error(`HTTP ${res.status}`)

						const arr = await res.json()
						const model = parseRunsFile(arr)
						if (!model) throw new Error("Invalid runs.json format")

						return { folder, model, error: null }

					}catch(e){
						return { folder, model: null, error: e }
					}
				})

				const results = await Promise.all(runFetches)

				// Render immediately (no cover fetch yet)
				let okCount = 0
				let errCount = 0

				const coverTasks = []

				for (const r of results){

					if (r.error){
						errCount++

						const card = document.createElement("div")
						card.className = "card"
						card.innerHTML = `
							<div class="head">
								<div class="title">${escapeHtml(r.folder)}</div>
								<div class="tag">error</div>
							</div>
							<div class="emptyCardBody">
								Failed to load <code class="inline">games/${escapeHtml(r.folder)}/runs.json</code><br/>
								<span style="color: var(--muted);">(${escapeHtml(r.error?.message || String(r.error))})</span>
							</div>
						`
						gamesRoot.appendChild(card)

						continue
					}

					const model = r.model

					const card = renderGameSection(model, null)
					const img = card.querySelector(".gameThumb")

					gamesRoot.appendChild(card)

					okCount++

					// Queue cover fetch for later
					if (model.image){
						coverTasks.push({ model, img })
					}
				}

				statusPill.textContent = errCount
					? `Status: OK (${okCount} ok, ${errCount} failed)`
					: `Status: OK (${okCount})`

				// Fetch all covers in parallel AFTER UI appears
				Promise.all(
					coverTasks.map(async t => {
						try{
							const cover = await fetchSpeedrunCover(t.model.image)
							if (cover){
								t.img.src = cover
							}
						}catch{}
					})
				)
			}

			loadAllGames()
		</script>
	</body>
</html>
